<script>
  // ====== 建立 Blockly 工作區 ======
  const toolbox = {
    "kind": "flyoutToolbox",
    "contents": [
      { kind: "block", type: "controls_repeat_ext" },
      { kind: "block", type: "controls_if" },
      { kind: "block", type: "logic_compare" },
      { kind: "block", type: "logic_operation" },
      { kind: "block", type: "logic_boolean" },
      { kind: "block", type: "math_number" },
      { kind: "block", type: "math_arithmetic" },
      { kind: "block", type: "math_random_int" },
      { kind: "block", type: "text" },
      { kind: "block", type: "text_print" },
      { kind: "block", type: "variables_get" },
      { kind: "block", type: "variables_set" },
      { kind: "block", type: "procedures_defnoreturn" }
    ]
  };

  Blockly.utils.colour.setHsvSaturation(1);
  Blockly.utils.colour.setHsvValue(1);
  const workspace = Blockly.inject('blocklyDiv', {
    toolbox: toolbox,
    renderer: 'thrasos',
    zoom: {
      controls: false,  // 🔒 關閉右下角縮放按鈕
      wheel: false,     // 🔒 關閉滑鼠滾輪縮放
      startScale: .8,  // 固定初始縮放比例
      maxScale: 1.0,    // 不可放大
      minScale: 1.0     // 不可縮小
    },
    trashcan: false
  });


// ====== 基本設定 ======
const COLS = 20, ROWS = 15  , CELL = 30;
const STAGE_W = COLS * CELL, STAGE_H = ROWS * CELL;

const COLOR_BG = '#444';
const COLOR_GRID = '#0a0';
const COLOR_GRID_BOLD = '#0f0';

const NINJA = '🥷', COP = '👮', WALL = '🧱', SCROLL = '📜', CANDLE = '🕯️';

const walls = [ [2,2],[2,3],[2,4],[6,5],[7,5],[8,5],[5,7],[5,8] ];
const scrollPos = { x:6, y:6 };
// === 蠟燭位置（請挑不與牆/卷軸重疊） ===
const candles = [ {x:3, y:1}, {x:8, y:6} ];

// === 角色初始設定（使用 r 代表朝向） ===
const ninja = { id:'ninja', x:1, y:8, r:0, emoji:NINJA, color:'#0ff' };
const cop   = { id:'cop',   x:8, y:1, r:0, emoji:COP,   color:'#f0f' };

// Konva 圖層
const stage   = new Konva.Stage({ container:'stage', width:STAGE_W, height:STAGE_H });
const gridL   = new Konva.Layer({ listening:false });
const propsL  = new Konva.Layer({ listening:false });
const unitsL  = new Konva.Layer({ listening:false });
const sensorL = new Konva.Layer({ listening:false }); // 專畫 FOV 外框
const cursorL = new Konva.Layer({ listening:false }); // hoverRect / selectRect
const darkL   = new Konva.Layer({ listening:false });
const glowL   = new Konva.Layer({ listening:false });

stage.add(gridL, propsL, unitsL , darkL, glowL, sensorL, cursorL);


function drawGrid(){
  gridL.add(new Konva.Rect({ x:0, y:0, width:STAGE_W, height:STAGE_H, fill:COLOR_BG }));
  for(let r=0;r<=ROWS;r++){
    gridL.add(new Konva.Line({ points:[0, r*CELL, STAGE_W, r*CELL], stroke:(r%5===0?COLOR_GRID_BOLD:COLOR_GRID), strokeWidth:1 }));
  }
  for(let c=0;c<=COLS;c++){
    gridL.add(new Konva.Line({ points:[c*CELL, 0, c*CELL, STAGE_H], stroke:(c%5===0?COLOR_GRID_BOLD:COLOR_GRID), strokeWidth:1 }));
  }
  gridL.draw();
}

function drawWalls(){
  walls.forEach(([x,y])=>{
    const {x:cx,y:cy} = cellRect(x,y);
    propsL.add(new Konva.Text({ x:cx, y:cy, width:CELL, height:CELL, align:'center', verticalAlign:'middle', text:WALL, fontSize:CELL*0.66 }));
  });
}


// === 畫出蠟燭 ===
function drawCandles(){
  propsL.find('.candle').forEach(n=>n.destroy()); // 清除舊的
  for(const c of candles){
    const emoji = new Konva.Text({
      x: c.x * CELL,
      y: c.y * CELL,
      width: CELL,
      height: CELL,
      align: 'center',
      verticalAlign: 'middle',
      text: CANDLE,
      fontSize: CELL * 0.7,
      listening: false,
      name: 'candle'
    });
    propsL.add(emoji);
  }
  propsL.draw();
}

// === 蠟燭 FOV ===
function candleCells(){
  let all = [];
  for(const c of candles){
    const cells = computeFOVHard(
      c.x, c.y, 0, 360, 2,   // 半徑 2，註解與數值一致
      { isBlocked:(x,y)=>isWall(x,y), includeOpaqueCell:true, includeStart:true }
    );
    all.push(...cells);
  }
  return all;
}

function drawScroll(){
  const {x,y} = scrollPos; const {x:cx,y:cy} = cellRect(x,y);
  propsL.add(new Konva.Text({ x:cx, y:cy, width:CELL, height:CELL, align:'center', verticalAlign:'middle', text:SCROLL, fontSize:CELL*0.6 }));
}



function inBounds(x,y){ return x>=0 && x<COLS && y>=0 && y<ROWS; }
function cellRect(x,y){ return { x:x*CELL, y:y*CELL, w:CELL, h:CELL }; }
function isWall(x,y){ return walls.some(([wx,wy])=> wx===x && wy===y); }
function occupiedByUnit(x,y){ return (x===ninja.x && y===ninja.y) || (x===cop.x && y===cop.y); }

function tryMove(unit, dx, dy){
  const nx = unit.x + dx, ny = unit.y + dy;
  if(!inBounds(nx,ny)) return;
  if(isWall(nx,ny)) return;
  if(occupiedByUnit(nx,ny)) return;
  unit.x = nx; unit.y = ny;
}

// function facingToAngle(f){ return f==='E'?0 : f==='S'?90 : f==='W'?180 : -90; }

// ====== 區域外框：僅描繪接壤外部的邊 ======
// ---- 角度工具 ----
const DEG2RAD = Math.PI / 180;
function normAngleRad(a){ return Math.atan2(Math.sin(a), Math.cos(a)); }

// ---- 起點->終點的整數格路徑（不含起點，含終點）----
function lineCells(x0, y0, x1, y1){
  const cells = [];
  let dx = Math.abs(x1 - x0), sx = x0 < x1 ? 1 : -1;
  let dy = -Math.abs(y1 - y0), sy = y0 < y1 ? 1 : -1;
  let err = dx + dy, x = x0, y = y0;
  while (true){
    if (!(x === x0 && y === y0)) cells.push([x, y]);
    if (x === x1 && y === y1) break;
    const e2 = 2 * err;
    if (e2 >= dy){ err += dy; x += sx; }
    if (e2 <= dx){ err += dx; y += sy; }
  }
  return cells;
}

/**
 * 硬遮蔽 FOV（扇形 + 視線，無軟遮蔽）
 * r 定義：r=0→(1,0) 右/E；r=2→(0,1) 下/S；r=4→(-1,0) 左/W；r=6→(0,-1) 上/N
 * @param {number} cx     角色 x
 * @param {number} cy     角色 y
 * @param {number} cr     朝向 r ∈ [0..7]（每步 45°，角度 = r*45°）
 * @param {number} angleDeg   扇形夾角（例：90、120、180）
 * @param {number} radius     視距（格）
 * @param {object} opts
 *  - isBlocked(x,y): boolean     // 該格是否為遮蔽物（牆、人、煙霧…）
 *  - includeOpaqueCell: boolean  // 撞到的「第一個遮蔽物格」是否算可見（預設 true）
 *  - includeStart: boolean       // 是否包含自己所在格（預設 false）
 * @returns {[number,number][]    可見格清單
 */
function computeFOVHard(cx, cy, cr, angleDeg, radius, opts = {}){
  const {
    isBlocked = (x,y)=> isWall(x,y) || occupiedByUnit(x,y),
    includeOpaqueCell = true,
    includeStart = false
  } = opts;

  const facingRad = (cr * 45) * Math.PI / 180;
  const halfAngle = (angleDeg * Math.PI / 180) / 2;
  const EPS = 1e-9;

  const out = [];
  const seen = new Set();

  const opaque = isBlocked; // ← 與逐格遮蔽一致

  for (let y = cy - radius; y <= cy + radius; y++){
    for (let x = cx - radius; x <= cx + radius; x++){
      if (!inBounds(x, y)) continue;
      if (!includeStart && x === cx && y === cy) continue;

      const dx = (x + 0.5) - (cx + 0.5);
      const dy = (y + 0.5) - (cy + 0.5);
      const dist = Math.hypot(dx, dy);

      // ★ 起點處理：允許把來源格加入
      if (dist < 1e-9) {
        if (includeStart) {
          const key = `${x},${y}`;
          if (!seen.has(key)) { seen.add(key); out.push([x, y]); }
        }
        continue; // 起點不需要走射線
      }

      if (dist === 0 || dist - 0.3 > radius + EPS) continue;

      const theta = Math.atan2(dy, dx);
      if (Math.abs(normAngleRad(theta - facingRad)) > halfAngle + EPS) continue;

      const path = lineCells(cx, cy, x, y);
      let blocked = false;

      for (let i = 0; i < path.length; i++){
        const [px, py] = path[i];
        const [prevx, prevy] = i ? path[i-1] : [cx, cy];

        // 角落規則：對角跨步，且兩側正交鄰格皆不透明 → 擋視線
        if (px !== prevx && py !== prevy) {
          if (opaque(prevx, py) || opaque(px, prevy)) { blocked = true; break; }
        }

        if (opaque(px, py)){
          if (includeOpaqueCell){
            const key = `${px},${py}`;
            if (!seen.has(key)) { seen.add(key); out.push([px, py]); }
          }
          blocked = true; break;
        }
      }

      if (!blocked){
        const key = `${x},${y}`;
        if (!seen.has(key)) { seen.add(key); out.push([x, y]); }
      }
    }
  }
  return out;
}


// 取得半徑 r 的圓形格集合（以格中心近似）
function diskCells(cx, cy, r){
  const cells = [];
  for (let y = cy - r; y <= cy + r; y++){
    for (let x = cx - r; x <= cx + r; x++){
      if (!inBounds(x,y)) continue;
      const dx = x - cx, dy = y - cy;
      const dist = Math.hypot(dx, dy);
      if (dist -.3 <= r) cells.push([x, y]);
    }
  }
  return cells;
}

function drawRegionOutline(cells, options={}){
  const color = options.color || '#ff3b3b';
  const width = options.width || 3;
  const style = options.style || 'solid'; // 'solid' or 'dashed'
  const dashPattern = style === 'dashed' ? [3, 4] : [];

  const set = new Set(cells.map(([x,y])=>`${x},${y}`));
  function has(x,y){ return set.has(`${x},${y}`); }

  for(const [x,y] of cells){
    const x0=x*CELL, y0=y*CELL, x1=(x+1)*CELL, y1=(y+1)*CELL;
    const lineOpt = { stroke: color, strokeWidth: width, lineCap: 'round', dash: dashPattern };

    if (!has(x, y - 1)) sensorL.add(new Konva.Line({ ...lineOpt, points: [x0, y0, x1, y0] }));
    if (!has(x + 1, y)) sensorL.add(new Konva.Line({ ...lineOpt, points: [x1, y0, x1, y1] }));
    if (!has(x, y + 1)) sensorL.add(new Konva.Line({ ...lineOpt, points: [x0, y1, x1, y1] }));
    if (!has(x - 1, y)) sensorL.add(new Konva.Line({ ...lineOpt, points: [x0, y0, x0, y1] }));
  }
  sensorL.batchDraw();
}





let hoverRect = null;
let selectRect = null;

// 取得格座標
function getCellFromPointer(pos){
  const x = Math.floor(pos.x / CELL);
  const y = Math.floor(pos.y / CELL);
  return {x, y};
}

// 滑鼠移動
stage.on('mousemove', (e)=>{
  const pos = stage.getPointerPosition();
  const {x, y} = getCellFromPointer(pos);
  // console.log(x,y)

  if (!inBounds(x,y)) return;

  // 若還沒建立 hoverRect 就建一個
  if (!hoverRect){
    hoverRect = new Konva.Rect({
      stroke: '#ff0',
      strokeWidth: 2,
      width: CELL, height: CELL,
      listening: false
    });
    cursorL.add(hoverRect);
  }
  // console.log(hoverRect.position())
  hoverRect.position({x: x*CELL, y: y*CELL});

  cursorL.batchDraw();
});

// 點選格子
stage.on('click', (e)=>{
  const pos = stage.getPointerPosition();
  const {x, y} = getCellFromPointer(pos);

  if (!inBounds(x,y)) return;

  // 如果沒有 selectRect 就建立
  if (!selectRect){
    selectRect = new Konva.Rect({
      stroke: '#ff0',
      strokeWidth: 3,
      shadowColor: '#ff0',
      cornerRadius: 4,       // 可選：圓角
      shadowBlur: 4,
      shadowOpacity: 0.5,
      width: CELL, height: CELL,
      listening: false
    });
    cursorL.add(selectRect);
  }

  selectRect.position({x: x*CELL, y: y*CELL});
  cursorL.batchDraw();
});


// 暗幕層（最上層），底下一切會變暗
// const darkL = new Konva.Layer({ listening:false });
const darkRect = new Konva.Rect({
  x:0, y:0, width: STAGE_W, height: STAGE_H,
  fill: 'rgba(0,0,0,0.4)', listening:false
});
darkL.add(darkRect);
// stage.add(darkL);

// 可選：亮區柔光層（在暗幕上方）
// const glowL = new Konva.Layer({ listening:false });
// stage.add(glowL);

function drawLighting(litCells){
  // 清掉舊孔洞
  darkL.find('.hole').forEach(n => n.destroy());
  glowL.destroyChildren();

  // 1) 暗幕上挖孔（一定要有 fill 才會真正畫像素）
  for (const [x, y] of litCells){
    const hole = new Konva.Rect({
      x: x * CELL,
      y: y * CELL,
      width: CELL,
      height: CELL,
      // cornerRadius: 10,
      fill: 'black',                      // ← 加上這行（顏色無所謂）
      globalCompositeOperation: 'destination-out',
      name: 'hole',
      listening: false
    });
    darkL.add(hole);
  }
  darkL.draw();

  // 2) 可選：亮區柔光（在暗幕上方的 glowL）
  for (const [x, y] of litCells){
    glowL.add(new Konva.Rect({
      x: x * CELL,
      y: y * CELL,
      width: CELL,
      height: CELL,
      fill: 'rgba(255,255,0,.4)',
      listening: false
    }));
  }
  glowL.draw();
}

// ====== 繪製雙方視覺範圍 ======
function drawAllFOV(){

    cop.y,       // 中心 y

    90,          // 視野夾角 (例：90°)

    {
      isBlocked: (x,y) => isWall(x,y) || occupiedByUnit(x,y),
      includeOpaqueCell: true,
      includeStart: false
    }
  );
  drawRegionOutline(guardCells, { color:'#f0f', width:2 ,style:'solid' });

  // === 忍者 FOV（青色） ===
  const ninjaCells = computeFOVHard(  
    ninja.x,
    ninja.y,
    ninja.r,
    90,
    6,
    {
      isBlocked: (x,y) => isWall(x,y) || occupiedByUnit(x,y),
      includeOpaqueCell: true,
      includeStart: false
    }
  );
  drawRegionOutline(ninjaCells, { color:'#0ff', width:2 ,style:'solid' });
}

function drawNightVision(unit, color='rgba(0,255,255,0.15)'){
  const cells = computeFOVHard(
    unit.x, unit.y, unit.r,
    90,      // 夜視夾角（可調）
    2,       // 夜視距離（可調）

      isBlocked:(x,y)=>isWall(x,y) || occupiedByUnit(x,y),
      includeOpaqueCell:true,
      // includeStart:true

  // 清掉上一回合的夜視圖層

  // 畫半透明區塊
  for(const [x,y] of cells){
    sensorL.add(new Konva.Rect({
      x:x*CELL, y:y*CELL, width:CELL, height:CELL,
      fill:color, opacity:0.5,
      listening:false,
      name:`nightvision-${unit.id}`
    }));

  sensorL.batchDraw();
}

// === 手電筒參數 ===
const TORCH_ANGLE  = 45; // 夾角
const TORCH_RANGE  = 6;  // 距離

// 計算警衛手電筒照亮格
function flashlightCells(guard){
  return computeFOVHard(
    guard.x, guard.y, guard.r,
    TORCH_ANGLE, TORCH_RANGE,
    {
      isBlocked: (x,y)=> isWall(x,y),   // 只被牆遮
      includeOpaqueCell: true,          // 牆面本格也算被光打到
      // includeStart: true                // 自己那格亮
    }
  );
}

// === 更新光照（蠟燭 + 手電筒） ===
function recomputeLighting(){
  const torch = flashlightCells(cop);  // 警衛手電筒
  const cands = candleCells();         // 蠟燭光源
  const set = new Set();
  for(const [x,y] of [...torch, ...cands]) set.add(`${x},${y}`);
  const litCells = [...set].map(k=>k.split(',').map(Number));
  drawLighting(litCells);
}

const unitGroups = {};

function makeUnitGroup(u){
  const g = new Konva.Group({ x:u.x*CELL, y:u.y*CELL, name:'unit', id:u.id });
    // ★ 粗框（跟隨框）：放在 group 內，永遠跟著角色
  // console.log(u.color)
  const frame = new Konva.Rect({
    x: 0,
    y: 0,
    width: CELL,
    height: CELL,
    stroke: u.color,       // 用角色色或隊伍色
    strokeWidth: 3,      // 粗一點

    listening: false,      // 不吃事件
    shadowColor: u.color,  // 可選：做點光暈
    shadowBlur: 4,
    shadowOpacity: 0.5
  });
  sensorL.add(frame)
  

  const hit = new Konva.Rect({ width:CELL, height:CELL, opacity:0 });
  const label = new Konva.Text({ x:0, y:0, width:CELL, height:CELL, align:'center', verticalAlign:'middle', text:u.emoji, fontSize:CELL*0.66 });
  // g.add(followFrame,hit, label);
  g.add(hit, label);

  unitGroups[u.id] = g;
  unitFrames[u.id] = frame;

  // g.cache();
  return g;
}

// 每回合呼叫一次，統一同步所有框位置
function renderUnitFrames(){
  for (const id in unitGroups){
    const u = id === 'ninja' ? ninja : cop;
    const frame = unitFrames[id];
    if (!frame) continue;
    sensorL.add(frame)
    frame.position({ x: u.x * CELL, y: u.y * CELL });  // 正確！
  }
  sensorL.batchDraw();  // 更新 sensorL
}

// 8向單位向量（r=0..7，順時針，每 45°）
const DIR8 = [
  {dx:+1, dy: 0}, // 0  → 右
  {dx:+1, dy:+1}, // 1  ↘
  {dx: 0, dy:+1}, // 2  ↓
  {dx:-1, dy:+1}, // 3  ↙
  {dx:-1, dy: 0}, // 4  ←
  {dx:-1, dy:-1}, // 5  ↖
  {dx: 0, dy:-1}, // 6  ↑
  {dx:+1, dy:-1}  // 7  ↗
];

// 不斜穿牆的八向移動（對角要過兩側都通）
function tryMove8(unit, sx, sy){
  const nx = unit.x + sx, ny = unit.y + sy;
  if (!inBounds(nx,ny)) return false;
  if (occupiedByUnit(nx,ny) || isWall(nx,ny)) return false;
  // 角落規則：對角時，任一側被擋就不過（更保守，避免貼牆偷過）
  if (sx && sy){
    if (isWall(unit.x + sx, unit.y) || isWall(unit.x, unit.y + sy)) return false;
  }
  unit.x = nx; unit.y = ny;
  return true;
}

// ── 警衛四動作 ──
function guardTurnLeft(u){  u.r = (u.r + 7) & 7; }     // -45°
function guardTurnRight(u){ u.r = (u.r + 1) & 7; }     // +45°
function guardStepForward(u){
  const {dx,dy} = DIR8[u.r];
  return tryMove8(u, dx, dy);           // 斜向走「一格」(Manhattan=2)
}
function guardStepBackward(u){
  const {dx,dy} = DIR8[(u.r + 4) & 7];  // 背向
  return tryMove8(u, dx, dy);
}

function guardRandomAct(u){
  const acts = [
    ()=>guardTurnLeft(u),
    ()=>guardTurnRight(u),
    ()=>guardStepForward(u),
    ()=>guardStepBackward(u),
  ];
  acts[Math.floor(Math.random()*acts.length)]();
}

    moved = true;
  }
}

    moved = true;
  }
}

    moved = true;

}
